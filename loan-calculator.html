<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <title>Loan Calculator</title>
 
  <meta
    name="description"
    content="Calculate monthly loan payments, total interest, and total repayment amount."
  />
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  
  <main class="page-wrap">
    <section class="hero">
      <h1>Loan Calculator</h1>
      <p>Estimate monthly payment, total interest, and payoff totals for a fixed-rate loan.</p>
    </section>

    <div id="validationMessage" class="validation-message" role="alert" aria-live="assertive" hidden></div>

    <section class="calculator-layout">
      <div class="panel form-panel">
        <form id="loanForm" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="loanAmount">Loan Amount</label>
              <input type="number" id="loanAmount" value="25000" min="0" step="100" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="interestRate">Interest Rate (%)</label>
              <input type="number" id="interestRate" value="7.25" min="0" step="0.01" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="loanTermYears">Loan Term (Years)</label>
              <input type="number" id="loanTermYears" value="5" min="1" step="1" inputmode="numeric" />
            </div>

            <div class="field">
              <label for="extraPayment">Extra Monthly Payment</label>
              <input type="number" id="extraPayment" value="0" min="0" step="1" inputmode="decimal" />
            </div>
          </div>

          <div class="button-row">
            <button class="btn btn-primary" type="submit">Calculate</button>
            <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
          </div>
        </form>
      </div>

      <aside class="panel results-panel" aria-live="polite">
        <div class="main-result-card">
          <div class="result-kicker">Estimated Monthly Payment</div>
          <div class="main-result" id="monthlyResult">$0.00</div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Total of Payments</span>
            <span class="stat-value" id="totalPaidResult">$0.00</span>
          </div>

          <div class="stat-card">
            <span class="stat-label">Total Interest</span>
            <span class="stat-value" id="totalInterestResult">$0.00</span>
          </div>

          <div class="stat-card">
            <span class="stat-label">Estimated Payoff Time</span>
            <span class="stat-value" id="payoffTimeResult">0 months</span>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="loan.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <title>Tip Calculator</title>
  <meta
    name="description"
    content="Calculate tip amount, total bill, and split payment per person."
  />
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  <main class="page-wrap">
    <section class="hero">
      <h1>Tip Calculator</h1>
      <p>Quickly calculate tip and split the bill across multiple people.</p>
    </section>

    <div id="validationMessage" class="validation-message" role="alert" aria-live="assertive" hidden></div>

    <section class="calculator-layout">
      <div class="panel form-panel">
        <form id="tipForm" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="billAmount">Bill Amount</label>
              <input type="number" id="billAmount" value="120" min="0" step="0.01" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="tipPercent">Tip (%)</label>
              <input type="number" id="tipPercent" value="18" min="0" step="0.1" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="peopleCount">Number of People</label>
              <input type="number" id="peopleCount" value="3" min="1" step="1" inputmode="numeric" />
            </div>
          </div>

          <div class="button-row">
            <button class="btn btn-primary" type="submit">Calculate</button>
            <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
          </div>
        </form>
      </div>

      <aside class="panel results-panel" aria-live="polite">
        <div class="main-result-card">
          <div class="result-kicker">Total Per Person</div>
          <div class="main-result" id="perPersonResult">$0.00</div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Tip Amount</span>
            <span class="stat-value" id="tipAmountResult">$0.00</span>
          </div>

          <div class="stat-card">
            <span class="stat-label">Total Bill (with Tip)</span>
            <span class="stat-value" id="totalBillResult">$0.00</span>
          </div>

          <div class="stat-card">
            <span class="stat-label">Bill Per Person (before Tip)</span>
            <span class="stat-value" id="billPerPersonResult">$0.00</span>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="tip.js"></script>
</body>
</html>

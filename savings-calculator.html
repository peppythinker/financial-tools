<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <title>Savings Calculator</title>
  <meta
    name="description"
    content="Estimate future savings growth based on starting balance, monthly contributions, interest rate, and time horizon."
  />
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  <main class="page-wrap">
    <section class="hero">
      <h1>Savings Calculator</h1>
      <p>Project how your savings can grow over time with monthly contributions and compound interest.</p>
    </section>

    <div id="validationMessage" class="validation-message" role="alert" aria-live="assertive" hidden></div>

    <section class="calculator-layout">
      <div class="panel form-panel">
        <form id="savingsForm" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="initialDeposit">Initial Deposit</label>
              <input type="number" id="initialDeposit" value="5000" min="0" step="100" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="monthlyContribution">Monthly Contribution</label>
              <input type="number" id="monthlyContribution" value="300" min="0" step="10" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="annualRate">Annual Interest Rate (%)</label>
              <input type="number" id="annualRate" value="4.5" min="0" step="0.01" inputmode="decimal" />
            </div>

            <div class="field">
              <label for="years">Savings Period (Years)</label>
              <input type="number" id="years" value="10" min="1" step="1" inputmode="numeric" />
            </div>
          </div>

          <div class="button-row">
            <button class="btn btn-primary" type="submit">Calculate</button>
            <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
          </div>
        </form>
      </div>

      <aside class="panel results-panel" aria-live="polite">
        <div class="main-result-card">
          <div class="result-kicker">Estimated Future Value</div>
          <div class="main-result" id="futureValueResult">$0.00</div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">Total Contributions</span>
            <span class="stat-value" id="contributionsResult">$0.00</span>
          </div>

          <div class="stat-card">
            <span class="stat-label">Interest Earned</span>
            <span class="stat-value" id="interestEarnedResult">$0.00</span>
          </div>

          <div class="stat-card">
            <span class="stat-label">Monthly Goal Pace</span>
            <span class="stat-value" id="monthlyPaceResult">$0.00</span>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="savings.js"></script>
</body>
</html>
